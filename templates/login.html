{% extends "base.html" %}

{% block content %}
<section class="py-5" style="background: linear-gradient(to bottom, var(--primary-light) 0%, transparent 100%); min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-premium p-4 rounded-4 bg-white">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-shaded text-success fs-1"></i>
                        <h2 class="fw-bold mt-2" data-i18n="login_link">Login</h2>
                        <p class="text-muted small">Access your AgriGuard Dashboard and Scan History</p>
                    </div>
                    
                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label form-label-custom">Email Address</label>
                            <input type="email" class="form-control form-control-custom" id="email" name="email" required placeholder="name@email.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label form-label-custom">Password</label>
                            <input type="password" class="form-control form-control-custom" id="password" name="password" required placeholder="••••••••">
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label text-muted small" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-success text-decoration-none small" onclick="alert('Forgot password functionality: Please contact admin@agriguard.com to reset your password.');">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-custom w-100 py-2 fs-6">Sign In</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted small mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-success text-decoration-none fw-bold" data-i18n="register_link">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
